{% extends "newsApp/base.html" %}

{% block title %}Create Publisher - The Speedy Spectator{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create Publisher</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="card-actions">
            <button type="submit" class="btn btn-success">Create Publisher</button>
            <a href="{% url 'publisher_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
