{% extends "newsApp/base.html" %}

{% block title %}Confirm Subscription - The Speedy Spectator{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Confirm</h2>
    <p>Are you sure you want to <strong>{{ action }}</strong> <strong>{{ item }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <div class="card-actions">
            <button type="submit" class="btn btn-success">Yes, confirm</button>
            <a href="{% url cancel_url %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
